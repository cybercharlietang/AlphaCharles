data_dir: data/sl_shards
output_dir: runs/sl_warmstart
resume_from: null
bf16: true
num_workers: 4
total_steps: 150000
ckpt_every: 10000
log_every: 50
wandb: true
wandb_project: alphazero-chess
run_name: sl_warmstart

model:
  channels: 256
  num_blocks: 20

train:
  lr: 2.0e-3
  weight_decay: 1.0e-4
  batch_size: 2048
  policy_loss_weight: 1.0
  value_loss_weight: 1.0
  grad_clip: 5.0
